name: Smart Selective CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      logic: ${{ steps.filter.outputs.logic }}
      ui: ${{ steps.filter.outputs.ui }}
      pages: ${{ steps.filter.outputs.pages }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            logic:
              - 'src/**/*.ts'
              - 'src/**/*.tsx'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vitest.config.ts'
            ui:
              - 'src/app/**'
              - 'src/components/**'
              - 'playwright/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
            pages:
              - 'src/app/**'
              - 'src/components/**'
              - 'public/**'
              - 'lighthouserc*.js'
              - 'next.config.*'
              - 'tailwind.config.*'
              - 'src/styles/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  vitest:
    name: Vitest Unit & Integration
    needs: changes
    if: ${{ needs.changes.outputs.logic == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Run Vitest Tests
        run: pnpm run test

  playwright:
    name: Playwright E2E
    needs: [changes, vitest]
    if: |
      always() &&
      needs.changes.outputs.ui == 'true' &&
      (needs.vitest.result == 'success' || needs.vitest.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Build Next.js App
        run: pnpm build

      - name: Run Playwright Tests
        run: pnpm exec playwright test

      - name: Upload Playwright Report Artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  lighthouse:
    name: Lighthouse Performance Audit
    needs: [changes, vitest]
    if: |
      always() &&
      needs.changes.outputs.pages == 'true' &&
      (needs.vitest.result == 'success' || needs.vitest.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Build Next.js App
        run: pnpm build

      - name: Run Lighthouse CI (Mobile)
        run: pnpm run test:lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Run Lighthouse CI (Desktop)
        run: pnpm run test:lighthouse:desktop
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse Reports Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
